services:
  api:
    build: .
    container_name: support-ticket-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: support-ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_ticket_db
    ports:
      - "5432:5432"